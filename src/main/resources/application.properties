# Application Configuration
app.name=Database Backup Utility
app.version=1.0.0
app.description=A comprehensive CLI utility for backing up multiple database types

# Logging Configuration
logging.level.root=INFO
logging.level.com.databasebackup=DEBUG
logging.file.path=./logs

# Backup Configuration (defaults)
backup.compression.enabled=true
backup.compression.type=gzip
backup.retry.attempts=3
backup.retry.delay=5000

# Storage Configuration (defaults)
storage.local.retention.days=30
storage.chunk.size=1048576
